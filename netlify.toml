[build]
  base = "."
  command = "npm run build --workspace=@media-office/admin"
  publish = "apps/admin/.next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  # Bump to force Netlify rebuild when middleware routing changes
  MEDIA_OFFICE_BUILD_ID = "admin-employee-split-v2"

[[plugins]]
  package = "@netlify/plugin-nextjs"
