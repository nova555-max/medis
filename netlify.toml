[build]
  base = "."
  command = "npm run build --workspace=@media-office/admin"
  publish = "apps/admin/.next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  MEDIA_OFFICE_BUILD_ID = "inline-otp-no-domain-v1"
  # Without a verified domain, registration OTP is shown on screen (not emailed)
  REGISTER_OTP_INLINE = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"
